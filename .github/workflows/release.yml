name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Extract release notes from changelog
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # When triggered by a release event, derive tag from the release tag name
          if [ -z "$tag" ] || [ "$tag" = "refs/heads/" ]; then
            tag="${{ github.event.release.tag_name }}"
          fi

          echo "TAG=$tag" >> "$GITHUB_ENV"

          awk -v tag="$tag" '
            $0 ~ "^## " tag "([[:space:]]-|$)" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Could not find a CHANGELOG entry for $tag" >&2
            exit 1
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$TAG"

          gh release upload "$tag" main.js manifest.json styles.css --clobber

          gh release edit "$tag" \
            --title="$tag" \
            --notes-file=release-notes.md
